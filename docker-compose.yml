services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: techport
      POSTGRES_PASSWORD: techport
      POSTGRES_DB: techport
    ports:
      - "5543:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techport"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
