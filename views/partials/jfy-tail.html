{{define "jfy-tail"}}
{{range .Cards}}{{template "product-card" .}}{{end}}
<div id="jfy-tail" class="jfy-tail">
    {{if .HasMore}}
    <button class="btn btn-outline" hx-get="/jfy?page={{.NextPage}}" hx-target="#jfy-tail" hx-swap="outerHTML">
        Load more
    </button>
    {{end}}
</div>
{{end}}
