{{define "product-card"}}
<a class="product-card" href="/p/{{.Slug}}">
    <div class="card-media">
        <img src="{{.Image}}" alt="{{.Title}}" loading="lazy" width="400" height="400">
        {{if .CompareAtPrice}}<span class="badge badge-sale">Sale</span>{{end}}
    </div>
    <div class="card-body">
        <span class="card-category">{{.CategoryName}}</span>
        <h3 class="card-title">{{.Title}}</h3>
        <div class="card-price">
            <span class="price">{{money .Price}}</span>
            {{if .CompareAtPrice}}<span class="price-compare">{{moneyPtr .CompareAtPrice}}</span>{{end}}
        </div>
    </div>
</a>
{{end}}
