{{define "title"}}Sign Up — TechPort{{end}}

{{define "content"}}
<section class="section">
    <div class="container auth-wrap">
        <form class="auth-card" method="post" action="/register">
            <h1 class="page-title">Create your account</h1>
            <p class="auth-sub">Track orders easily and check out faster.</p>
            <input type="hidden" name="next" value="{{.Next}}">
            <label class="field">
                <span>Full name</span>
                <input name="name" value="{{.Values.name}}" placeholder="e.g. Ahmed Khan" required autofocus>
                {{with .Errors.name}}<em class="field-error">{{.}}</em>{{end}}
            </label>
            <label class="field">
                <span>Mobile number</span>
                <input name="phone" type="tel" value="{{.Values.phone}}" placeholder="03XX XXXXXXX" required>
                {{with .Errors.phone}}<em class="field-error">{{.}}</em>{{end}}
            </label>
            <label class="field">
                <span>Email <small>(optional)</small></span>
                <input name="email" type="email" value="{{.Values.email}}">
            </label>
            <label class="field">
                <span>Password</span>
                <input name="password" type="password" minlength="6" required>
                {{with .Errors.password}}<em class="field-error">{{.}}</em>{{end}}
            </label>
            <button class="btn btn-primary btn-block" type="submit">Sign up</button>
            <p class="auth-alt">Already have an account? <a href="/login?next={{.Next}}">Login</a></p>
        </form>
    </div>
</section>
{{end}}
